<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CoolStore - Demo Checkout</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen flex items-center justify-center font-sans">
  <div class="max-w-md w-full bg-slate-900 border border-slate-800 p-8 rounded-2xl shadow-2xl flex flex-col gap-6">
    <div class="text-center">
      <h1 class="text-2xl font-extrabold text-indigo-400">👕 CoolStore Shop</h1>
      <p class="text-xs text-slate-400 mt-1">Simulated Checkout Storefront</p>
    </div>

    <!-- Product Card -->
    <div class="bg-slate-950 p-4 border border-slate-800 rounded-xl flex items-center gap-4">
      <div class="text-3xl">🛍️</div>
      <div>
        <h3 class="font-bold">Retro Summer Tee</h3>
        <p class="text-xs text-slate-500">$29.99 USD</p>
      </div>
    </div>

    <!-- Config Form (So you can paste your credentials) -->
    <div class="flex flex-col gap-3 text-xs bg-slate-950 p-4 border border-slate-800 rounded-xl">
      <div class="flex flex-col gap-1">
        <label class="text-slate-400 font-semibold uppercase">API Key (whpk_...)</label>
        <input id="apiKey" type="password" placeholder="whpk_live_..." class="bg-slate-900 border border-slate-850 p-2 rounded text-white focus:outline-none focus:border-indigo-500" />
      </div>
      <div class="flex flex-col gap-1">
        <label class="text-slate-400 font-semibold uppercase">Endpoint ID (ep_...)</label>
        <input id="endpointId" type="text" placeholder="ep_..." class="bg-slate-900 border border-slate-850 p-2 rounded text-white focus:outline-none focus:border-indigo-500" />
      </div>
    </div>

    <!-- Purchase Button -->
    <button id="buyBtn" onclick="triggerPurchase()" class="w-full bg-indigo-500 hover:bg-indigo-600 font-bold py-3 rounded-xl transition-all shadow-lg active:scale-[0.98]">
      Confirm Purchase ($29.99)
    </button>
    <div id="status" class="text-center text-xs"></div>
  </div>

  <script>
    async function triggerPurchase() {
      const apiKey = document.getElementById('apiKey').value.trim();
      const endpointId = document.getElementById('endpointId').value.trim();
      const statusDiv = document.getElementById('status');
      const buyBtn = document.getElementById('buyBtn');

      if (!apiKey || !endpointId) {
        statusDiv.innerText = "⚠️ Please configure your API Key and Endpoint ID first!";
        statusDiv.className = "text-center text-xs text-amber-400";
        return;
      }

      buyBtn.disabled = true;
      buyBtn.innerText = "Processing Transaction...";
      statusDiv.innerText = "";

      try {
        const response = await fetch('https://webhook-platform-api.masirjafri1.workers.dev/api/v1/events', {
          method: 'POST',
          headers: {
            'Authorization': 'Bearer ' + apiKey,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            endpointId: endpointId,
            eventType: 'order.placed',
            payload: {
              order_id: "ord_" + Math.random().toString(36).substring(2, 9),
              amount: 2999,
              currency: "usd",
              items: [{ name: "Retro Summer Tee", quantity: 1 }],
              shipping_address: {
                name: "John Doe",
                street: "123 Event Lane",
                city: "Cloud City"
              }
            }
          })
        });

        if (response.ok) {
          statusDiv.innerText = "🎉 Order Success! Webhook Dispatched.";
          statusDiv.className = "text-center text-xs text-emerald-400";
        } else {
          const err = await response.json();
          statusDiv.innerText = "❌ Error: " + (err.error || response.statusText);
          statusDiv.className = "text-center text-xs text-rose-400";
        }
      } catch (err) {
        statusDiv.innerText = "❌ Connection failed: " + err.message;
        statusDiv.className = "text-center text-xs text-rose-400";
      } finally {
        buyBtn.disabled = false;
        buyBtn.innerText = "Confirm Purchase ($29.99)";
      }
    }
  </script>
</body>
</html>
